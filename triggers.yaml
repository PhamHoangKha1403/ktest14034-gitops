apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: ktest14034-git-binding
spec:
  params:
    - name: git-repo-url
      value: $(body.repository.clone_url)
    - name: git-revision
      value: $(body.head_commit.id)
    - name: git-repo-name
      value: $(body.repository.name)
    - name: git-owner
      value: $(body.repository.owner.login)

---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: ktest14034-git-template
spec:
  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: ktest14034-run-
        labels:
          tekton.dev/pipeline: from-code-to-cluster
          app.kubernetes.io/instance: ktest14034
      spec:
        serviceAccountName: pipeline
        pipelineRef:
          name: from-code-to-cluster
        params:
          - name: app-repo-url
            value: $(tt.params.git-repo-url)
          - name: app-repo-revision
            value: $(tt.params.git-revision)
          - name: image-repo
            value: "index.docker.io/phamhoangkha1403/phamhoangkha1403" 
          - name: GITOPS_REPO_URL
            value: "$(tt.params.git-repo-url)-gitops"
          - name: GITOPS_REPO_BRANCH
            value: "main"
          - name: MANIFEST_PATH
            value: "deployment.yaml"
          - name: docker-secret
            value: "docker-credentials"

---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: ktest14034-listener
spec:
  serviceAccountName: ktest14034-sa
  triggers:
    - binding:
        name: ktest14034-git-binding
      template:
        name: ktest14034-git-template

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ktest14034-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ktest14034-listener-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
subjects:
  - kind: ServiceAccount
    name: ktest14034-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ktest14034-listener-clusterbinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
subjects:
  - kind: ServiceAccount
    name: ktest14034-sa
    namespace: default
